<html lang="en"><head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.13/html-to-image.min.js" integrity="sha512-iZ2ORl595Wx6miw+GuadDet4WQbdSWS3JLMoNfY8cRGoEFy6oT3G9IbcrBeL6AfkgpA51ETt/faX6yLV+/gFJg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
      (function() {
        const originalConsole = window.console;
        window.console = {
          log: (...args) => {
            originalConsole.log(...args);
            window.parent.postMessage({ type: 'console', message: args.join(' ') }, '*');
          },
          error: (...args) => {
            originalConsole.error(...args);
            window.parent.postMessage({ type: 'console', message: 'Error: ' + args.join(' ') }, '*');
          },
          warn: (...args) => {
            originalConsole.warn(...args);
            window.parent.postMessage({ type: 'console', message: 'Warning: ' + args.join(' ') }, '*');
          }
        };

        let requestId = 0;
        let callbacksMap = new Map();
        let streamControllers = new Map();
        
        window.claude = {
          complete: (prompt) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'claudeComplete', id, prompt }, '*');
            });
          }
        };

        window.storage = {
          get: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageGet', id, key, shared }, '*');
            });
          },
          set: (key, value, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageSet', id, key, value, shared }, '*');
            });
          },
          delete: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageDelete', id, key, shared }, '*');
            });
          },
          list: (prefix, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageList', id, prefix, shared }, '*');
            });
          }
        };

        let pendingBlobs = new Map();
        URL.createObjectURL = (blob) => {
          // Store the blob and create an ID and URL for it
          const blobId = `blob-${Date.now()}-${Math.random()}`;
          pendingBlobs.set(blobId, blob);
          return `blob-request://${blobId}`;
        };

        URL.revokeObjectURL = (url) => {
          // Remove the blob from our store
          const blobId = url.replace("blob-request://", "");
          pendingBlobs.delete(blobId);
        };

        const getBlobFromURL = (url) => {
          const blobId = url.replace("blob-request://", "");
          return pendingBlobs.get(blobId);
        };

        // Override global fetch with streaming support
        window.fetch = (url, init = {}) => {
          return new Promise((resolve, reject) => {
            const id = requestId++;
            const channelId = `fetch-${id}-${Date.now()}`;
            
            callbacksMap.set(id, { 
              resolve: (response) => {
                // Create a ReadableStream for the response body
                const stream = new ReadableStream({
                  start(controller) {
                    streamControllers.set(channelId, controller);
                  },
                  cancel() {
                    streamControllers.delete(channelId);
                  }
                });
                
                // Create and return the Response with the stream
                resolve(new Response(stream, {
                  status: response.status,
                  statusText: response.statusText,
                  headers: response.headers
                }));
              },
              reject,
              channelId
            });
            
            window.parent.postMessage({
              type: 'proxyFetch',
              id,
              url,
              init,
              channelId
            }, '*');
          });
        };

        window.addEventListener('message', async (event) => {
          if (event.data.type === 'takeScreenshot') {
            const rootElement = document.getElementById('artifacts-component-root-html');
            if (!rootElement) {
              window.parent.postMessage({
                type: 'screenshotError',
                error: new Error('Root element not found'),
              }, '*');
            }
            const screenshot = await htmlToImage.toPng(rootElement, {
              imagePlaceholder:
                "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAA1JREFUGFdjePDgwX8ACOQDoNsk0PMAAAAASUVORK5CYII=",
            });
            window.parent.postMessage({
              type: 'screenshotData',
              data: screenshot,
            }, '*');
          } else if (event.data.type === 'claudeComplete') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.completion);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'proxyFetchResponse') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
              callbacksMap.delete(event.data.id);
            } else {
              // Initial response with headers, status, etc.
              callback.resolve({
                status: event.data.status,
                statusText: event.data.statusText,
                headers: event.data.headers
              });
              // Don't delete the callback yet if streaming
              if (!event.data.body) {
                callbacksMap.delete(event.data.id);
              }
            }
          } else if (event.data.type === 'proxyFetchStream') {
            // Handle streaming data chunks
            const controller = streamControllers.get(event.data.channelId);
            if (controller) {
              if (event.data.error) {
                controller.error(new Error(event.data.error));
                streamControllers.delete(event.data.channelId);
              } else if (event.data.done) {
                controller.close();
                streamControllers.delete(event.data.channelId);
                // Clean up the callback
                const callback = Array.from(callbacksMap.entries()).find(
                  ([_, value]) => value.channelId === event.data.channelId
                );
                if (callback) {
                  callbacksMap.delete(callback[0]);
                }
              } else if (event.data.chunk) {
                controller.enqueue(new Uint8Array(event.data.chunk));
              }
            }
          } else if (event.data.type === 'storageGet') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageSet') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageDelete') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageList') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          }
        });

        window.addEventListener('click', (event) => {
          const isEl = event.target instanceof HTMLElement;
          if (!isEl) return;
    
          // find ancestor links
          const linkEl = event.target.closest("a");
          if (!linkEl || !linkEl.href) return;
    
          event.preventDefault();
          event.stopImmediatePropagation();
    
          if (linkEl.href.startsWith("blob-request:")) {
            const blob = getBlobFromURL(linkEl.href);
            if (!blob) return;
            void blob.arrayBuffer().then((data) => {
              window.parent.postMessage({
                type: "downloadFile",
                filename: linkEl.download,
                data,
                mimeType: blob.type || "application/octet-stream",
              });
            });
          } else if (linkEl.href.startsWith("data:")) {
            const [header, base64Data] = linkEl.href.split(",");
            const mimeMatch = header.match(/data:([^;]+)/);
            const mimeType = mimeMatch ? mimeMatch[1] : "application/octet-stream";
            const binaryString = atob(base64Data);
            const data = Uint8Array.from(binaryString, (c) =>
              c.charCodeAt(0),
            ).buffer;
            window.parent.postMessage({
              type: "downloadFile",
              filename: linkEl.download,
              data,
              mimeType,
            });
          } else {
            let linkUrl;
            try {
              linkUrl = new URL(linkEl.href);
            } catch (error) {
              return;
            }
    
            if (linkUrl.hostname === window.location.hostname) return;
      
            window.parent.postMessage({
              type: 'openExternal',
              href: linkEl.href,
            }, '*');
          }
      });

        const originalOpen = window.open;
        window.open = function (url) {
          window.parent.postMessage({
            type: "openExternal",
            href: url,
          }, "*");
        };

        window.addEventListener('error', (event) => {
          window.parent.postMessage({ type: 'console', message: 'Uncaught Error: ' + event.message }, '*');
        });
      })();
    </script>
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Post Review — Lure Fish House</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#08456B;--steel:#5380A2;--light-steel:#EBF2F8;
  --text:#1a1a1a;--muted:#6b7280;--border:#e5e7eb;--bg:#f7f8fa;--white:#ffffff;
}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.header{background:var(--navy);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:16px;}
.header-logo{color:white;font-size:20px;font-weight:700;letter-spacing:0.02em;}
.header-divider{width:1px;height:24px;background:rgba(255,255,255,0.2);}
.header-subtitle{color:rgba(255,255,255,0.55);font-size:12px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;}
.header-date{color:rgba(255,255,255,0.4);font-size:12px;}

/* TOOLBAR */
.toolbar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 40px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.toolbar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.filter-btn:hover{border-color:var(--steel);color:var(--navy);}
.filter-btn.active{background:var(--navy);border-color:var(--navy);color:white;}
.toolbar-right{display:flex;align-items:center;gap:8px;}
.view-toggle{display:flex;gap:4px;}
.view-btn{width:32px;height:32px;border:1px solid var(--border);background:transparent;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all 0.15s;}
.view-btn.active{background:var(--navy);border-color:var(--navy);color:white;}
.view-btn svg{width:14px;height:14px;}
.save-btn{padding:8px 18px;background:var(--steel);color:white;border:none;border-radius:8px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background 0.15s;}
.save-btn:hover{background:var(--navy);}
.save-btn svg{width:14px;height:14px;}

/* STATS */
.stats-bar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 40px;display:flex;gap:24px;align-items:center;flex-wrap:wrap;}
.stat{display:flex;align-items:center;gap:6px;font-size:12px;}
.stat-label{color:var(--muted);}
.stat-count{font-weight:600;color:var(--text);}

/* GRID */
.main{padding:32px 40px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;}
.grid.list-view{grid-template-columns:1fr;}

/* CARD */
.post-card{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:visible;transition:box-shadow 0.2s;position:relative;}
.post-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.08);}

/* MEDIA AREA */
.post-media{width:100%;aspect-ratio:4/5;background:#dde4ec;position:relative;overflow:hidden;border-radius:12px 12px 0 0;}
.list-view .post-card{display:flex;flex-direction:row;}
.list-view .post-media{width:160px;min-width:160px;aspect-ratio:unset;height:200px;border-radius:12px 0 0 12px;}
.list-view .post-body{flex:1;}

/* PLACEHOLDER */
.media-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#9ca3af;font-size:12px;font-weight:500;text-align:center;padding:20px;}
.media-placeholder svg{width:32px;height:32px;opacity:0.4;}

/* CAROUSEL */
.carousel-viewer{width:100%;height:100%;position:relative;}
.carousel-viewer img{width:100%;height:100%;object-fit:cover;display:block;}
.carousel-nav{position:absolute;top:50%;transform:translateY(-50%);width:100%;display:flex;justify-content:space-between;padding:0 10px;pointer-events:none;}
.carousel-btn{width:30px;height:30px;border-radius:50%;border:none;background:rgba(0,0,0,0.5);color:white;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;pointer-events:all;transition:background 0.15s;}
.carousel-btn:hover{background:rgba(0,0,0,0.75);}
.carousel-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;}
.carousel-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.45);transition:background 0.15s;}
.carousel-dot.active{background:white;}

/* VIDEO THUMBNAIL */
.video-thumb{width:100%;height:100%;position:relative;background:#111;cursor:pointer;}
.video-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.video-thumb .no-cover{width:100%;height:100%;background:linear-gradient(135deg,#08456B,#1a1a1a);display:flex;align-items:center;justify-content:center;}
.video-thumb .no-cover svg{width:48px;height:48px;opacity:0.25;fill:white;}
.play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;border-radius:50%;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;border:2px solid rgba(255,255,255,0.7);}
.play-btn:hover{background:rgba(8,69,107,0.9);transform:translate(-50%,-50%) scale(1.08);}
.play-btn svg{width:22px;height:22px;fill:white;margin-left:4px;}

/* VIDEO POPUP */
.video-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;display:none;align-items:center;justify-content:center;}
.video-popup-overlay.active{display:flex;}
.video-popup-inner{position:relative;width:90%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;}
.video-popup-close{position:absolute;top:-44px;right:0;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;z-index:10;line-height:1;}
.video-popup-close:hover{background:rgba(255,255,255,0.25);}
.video-popup-inner video{width:100%;max-height:85vh;border-radius:10px;display:block;background:#000;}
.video-popup-title{color:rgba(255,255,255,0.7);font-size:12px;font-weight:500;text-align:center;margin-top:10px;letter-spacing:0.04em;}

/* MEDIA PANEL */
.media-panel{position:absolute;inset:0;background:rgba(8,69,107,0.92);z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;border-radius:12px 12px 0 0;}
.media-panel.active{display:flex;}
.media-panel-title{color:rgba(255,255,255,0.7);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;}

/* URL INPUT ROW */
.url-input-group{width:100%;display:flex;flex-direction:column;gap:6px;}
.url-input-row{display:flex;gap:6px;width:100%;}
.url-input{flex:1;padding:7px 10px;border-radius:7px;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.12);color:white;font-family:'Montserrat',sans-serif;font-size:11px;outline:none;transition:border-color 0.15s;}
.url-input::placeholder{color:rgba(255,255,255,0.35);}
.url-input:focus{border-color:rgba(255,255,255,0.6);}
.url-apply-btn{padding:7px 12px;border-radius:7px;border:none;background:white;color:var(--navy);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background 0.15s;}
.url-apply-btn:hover{background:var(--light-steel);}

/* Carousel URL list */
.carousel-url-list{width:100%;display:flex;flex-direction:column;gap:5px;max-height:130px;overflow-y:auto;}
.carousel-url-item{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);border-radius:6px;padding:5px 8px;}
.carousel-url-item span{flex:1;font-size:10px;color:rgba(255,255,255,0.7);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.carousel-url-remove{background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:14px;line-height:1;padding:0 2px;}
.carousel-url-remove:hover{color:white;}
.carousel-add-row{display:flex;gap:6px;width:100%;}

.panel-type-tabs{display:flex;gap:6px;margin-bottom:6px;}
.panel-tab{padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.25);background:transparent;color:rgba(255,255,255,0.6);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;transition:all 0.15s;}
.panel-tab.active{background:white;border-color:white;color:var(--navy);}
.panel-section{display:none;width:100%;}
.panel-section.active{display:flex;flex-direction:column;gap:8px;align-items:center;}

.panel-cancel-btn{padding:6px 16px;border-radius:7px;border:1px solid rgba(255,255,255,0.3);background:transparent;color:rgba(255,255,255,0.7);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;margin-top:4px;}
.panel-cancel-btn:hover{border-color:white;color:white;}

/* EDIT MEDIA BUTTON */
.edit-media-btn{position:absolute;bottom:10px;right:10px;z-index:15;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.3);color:white;border-radius:6px;padding:5px 10px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.05em;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background 0.15s;}
.edit-media-btn:hover{background:rgba(8,69,107,0.85);}
.edit-media-btn svg{width:11px;height:11px;}

/* FORMAT BADGE */
.format-badge{position:absolute;top:10px;left:10px;z-index:15;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border:none;font-family:'Montserrat',sans-serif;}
.badge-feed{background:rgba(8,69,107,0.85);color:white;}
.badge-reel{background:rgba(83,128,162,0.9);color:white;}
.badge-carousel{background:rgba(255,255,255,0.92);color:var(--navy);}
.badge-story{background:rgba(0,0,0,0.65);color:white;}
.format-dropdown{position:absolute;top:36px;left:10px;z-index:50;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);overflow:hidden;display:none;min-width:100px;}
.format-option{padding:8px 14px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Montserrat',sans-serif;color:var(--text);transition:background 0.1s;text-transform:uppercase;letter-spacing:0.05em;}
.format-option:hover{background:var(--light-steel);color:var(--navy);}

/* POST BODY */
.post-body{padding:16px;}
.post-date-wrap{margin-bottom:8px;position:relative;}
.post-date{font-size:11px;font-weight:600;color:var(--steel);text-transform:uppercase;letter-spacing:0.06em;cursor:pointer;display:inline-flex;align-items:center;gap:5px;border-bottom:1px dashed transparent;transition:border-color 0.15s;}
.post-date:hover{border-bottom-color:var(--steel);}
.post-date svg{width:11px;height:11px;opacity:0.55;flex-shrink:0;}
.date-picker-wrap{display:none;margin-top:4px;}
.date-picker-wrap input[type="date"]{font-size:11px;font-weight:500;color:var(--navy);border:1px solid var(--steel);border-radius:6px;padding:5px 8px;font-family:'Montserrat',sans-serif;outline:none;background:var(--white);cursor:pointer;accent-color:var(--navy);}
.post-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.35;cursor:pointer;border-bottom:1px dashed transparent;transition:border-color 0.15s;}
.post-title:hover{border-bottom-color:#ccc;}
.post-title-input{width:100%;font-size:13px;font-weight:700;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-family:'Montserrat',sans-serif;outline:none;display:none;margin-bottom:10px;}
.post-title-input:focus{border-color:var(--steel);}
.caption-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.caption-text{font-size:12px;color:#374151;line-height:1.7;white-space:pre-wrap;max-height:110px;overflow:hidden;position:relative;}
.caption-text.expanded{max-height:none;}
.caption-fade{position:absolute;bottom:0;left:0;right:0;height:36px;background:linear-gradient(transparent,white);}
.caption-text.expanded .caption-fade{display:none;}
.read-more{font-size:11px;font-weight:600;color:var(--steel);cursor:pointer;margin-top:4px;display:inline-block;background:none;border:none;padding:0;font-family:'Montserrat',sans-serif;}
.caption-textarea{width:100%;font-size:12px;color:#374151;line-height:1.7;border:1px solid var(--border);border-radius:6px;padding:8px;font-family:'Montserrat',sans-serif;resize:vertical;min-height:100px;outline:none;display:none;}
.caption-textarea:focus{border-color:var(--steel);}
.edit-caption-btn{font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;background:none;border:none;padding:3px 0;font-family:'Montserrat',sans-serif;margin-top:4px;display:inline-block;}
.edit-caption-btn:hover{color:var(--steel);}

/* ADD POST */
.add-post-card{background:transparent;border:2px dashed var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;min-height:300px;transition:all 0.2s;color:#9ca3af;font-size:13px;font-weight:500;font-family:'Montserrat',sans-serif;}
.add-post-card:hover{border-color:var(--steel);color:var(--steel);background:var(--light-steel);}
.add-post-card svg{width:28px;height:28px;}

/* NEW POST FORM CARD */
.new-post-form-card{background:var(--white);border-radius:12px;border:2px solid var(--steel);padding:24px;display:flex;flex-direction:column;gap:14px;}
.new-post-form-card h3{font-size:13px;font-weight:700;color:var(--navy);margin:0;}
.new-post-field{display:flex;flex-direction:column;gap:5px;}
.new-post-field label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
.new-post-field input{padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-family:'Montserrat',sans-serif;font-size:12px;color:var(--text);outline:none;transition:border-color 0.15s;}
.new-post-field input:focus{border-color:var(--steel);}
.format-radio-group{display:flex;gap:6px;flex-wrap:wrap;}
.format-radio{display:none;}
.format-radio-label{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:0.04em;}
.format-radio:checked + .format-radio-label{background:var(--navy);border-color:var(--navy);color:white;}
.new-post-actions{display:flex;gap:8px;margin-top:4px;}
.new-post-submit{flex:1;padding:9px;background:var(--navy);color:white;border:none;border-radius:8px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:background 0.15s;}
.new-post-submit:hover{background:var(--steel);}
.new-post-cancel{padding:9px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.new-post-cancel:hover{border-color:var(--muted);color:var(--text);}

@media print{.toolbar,.header,.edit-media-btn,.edit-caption-btn,.add-post-card{display:none !important;}.post-card{break-inside:avoid;}}
</style>
</head>
<body id="artifacts-component-root-html">

<!-- VIDEO POPUP -->
<div class="video-popup-overlay" id="videoPopup" onclick="closeVideoPopup(event)">
  <div class="video-popup-inner">
    <button class="video-popup-close" onclick="closeVideoPopupBtn()">✕</button>
    <video id="popupVideo" controls="" playsinline=""></video>
    <div class="video-popup-title" id="popupTitle"></div>
  </div>
</div>

<header class="header">
  <div class="header-left">
    <div class="header-logo">LURE FISH HOUSE</div>
    <div class="header-divider"></div>
    <div class="header-subtitle">Social Post Review</div>
  </div>
  <div class="header-date" id="headerDate"></div>
</header>

<div class="toolbar">
  <div class="toolbar-left">
    <button class="filter-btn active" onclick="filterPosts('all',this)">All</button>
    <button class="filter-btn" onclick="filterPosts('feed',this)">Feed</button>
    <button class="filter-btn" onclick="filterPosts('reel',this)">Reels</button>
    <button class="filter-btn" onclick="filterPosts('carousel',this)">Carousels</button>

  <div class="toolbar-right">

        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"></rect><rect x="9" y="1" width="6" height="6" rx="1"></rect><rect x="1" y="9" width="6" height="6" rx="1"></rect><rect x="9" y="9" width="6" height="6" rx="1"></rect></svg>
      </button>
      <button class="view-btn" id="listBtn" onclick="setView('list')" title="List">
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="3" rx="1"></rect><rect x="1" y="7" width="14" height="3" rx="1"></rect><rect x="1" y="12" width="14" height="3" rx="1"></rect></svg>
      </button>

    <button class="save-btn" onclick="saveFile()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 14h12V5l-3-3H2v12z"></path><path d="M5 14V9h6v5"></path><path d="M5 2v4h5"></path></svg>
      Save &amp; Export
    </button>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>
<main class="main"><div class="grid" id="postsGrid"></div></main>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
let posts = [{"id":1,"title":"Earth Day / Sustainability Story","date":"2026-04-22","format":"carousel","caption":"Before Earth Day was a hashtag, it was a reason we opened our doors.\n\n15 years ago, Lure Fish House was founded on one simple idea: fresh, local, sustainably sourced seafood. Not as a selling point. As a commitment.\n\nOur oceans cover most of this earth. Every sourcing decision, every ingredient, every supplier has been chosen with that in mind.\n\nWe've been doing this for 15 years, and we'll be doing it for the next 15.\n\nHappy Earth Day — from a restaurant that means it. 🌊"},{"id":8,"title":"Sounds of the Kitchen","date":"2026-04-26","format":"reel","caption":"From prep to plate — this is where the magic happens. But what you don’t see matters just as much. No seed oils, no shortcuts — just clean, high-quality ingredients and everything made from scratch. Real food, done right. 🐟🥑\n\n#BehindTheScenes #CleanEating #NoSeedOils #FromScratch #KitchenTransparency"},{"id":2,"title":"Healthy Eating at Lure","date":"2026-04-30","format":"reel","caption":"Eating well doesn't have to be a struggle.\n\nAt Lure, we've always believed that healthy food should taste incredible — not like a compromise. Whether you're gluten-free, pescatarian, vegetarian, or just trying to eat cleaner, you'll find something here worth getting excited about.\n\nAnd we're proud to be 100% seed oil free. Because we think you deserve to know exactly what's in your food.\n\nCome eat well. 🌊"},{"id":3,"title":"Mother's Day / Gift Card Push","date":"2026-05-03","format":"feed","caption":"Still figuring out Mother's Day?\n\nA Lure gift card means she gets to choose her own oysters, her own cocktail, her own moment. Honestly, it might be the best plan you've made all week.\n\nGift cards available in restaurant or online — link in bio."},{"id":10,"title":"Cinco de Mayo / Roasted Blueberry Basil Margarita","date":"2026-05-05","format":"carousel","caption":"When you want something better than a basic margarita.\n\nRoasted blueberries. Fresh basil. Fresh-squeezed lime juice. Organic agave. Del Valle tequila. Our Roasted Blueberry Basil Margarita is made fresh every time. \n\nThis is what Cinco de Mayo tastes like at Lure."},{"id":4,"title":"Mother's Day","date":"2026-05-10","format":"feed","caption":"She deserves oysters.\n\nAnd a table she didn't have to set, dishes she doesn't have to wash, and a meal that actually feels special. Mother's Day at Lure — because she's earned it.\n\nReservations for parties of 8 or more at the link in bio. Smaller parties welcome walk-in — we'd love to see you."},{"id":9,"title":"Bread","date":"2026-05-12","format":"reel","caption":"You came for the oysters. You stayed for the bread. If you know, you know."},{"id":5,"title":"Giant Prawns","date":"2026-05-16","format":"feed","caption":"Don't call me a shrimp.\n\nWe're gonna need a bigger grill. 🔥\n\nOur giant prawns — grilled, fresh, and honestly a little intimidating. On the menu year-round, for good reason.\n\nCome meet them."},{"id":6,"title":"Summer Teaser / Patio Drinks","date":"2026-05-19","format":"carousel","caption":"Summer doesn't officially start for a few weeks. We're not waiting."},{"id":7,"title":"Long Weekend / Happy Hour","date":"2026-05-22","format":"feed","caption":"Long weekend incoming. You know where to find us.\n\nCome eat well. 🌊"},{"id":11,"title":"Memorial Day","date":"2026-05-25","format":"carousel","caption":"Summer starts now."}];

// mediaStore: { postId: { type:'image'|'carousel'|'video', url?, urls?[], coverUrl? } }
let mediaStore = {"1":{"type":"carousel","urls":["https://www.dropbox.com/scl/fi/gdri3wrish4pdzsalo0xh/Lure_Social_2025_04_Apr22_EarthDay_Post_01_v01.jpg?rlkey=1glqhy4ax6711ss3drm2wksk8&dl=0","https://www.dropbox.com/scl/fi/nbkiwlzndc18ha7jkyhey/Lure_Social_2025_04_Apr22_EarthDay_Post_02_v01.jpg?rlkey=1tvmmmwebpes6byfrw05nr9tl&dl=0","https://www.dropbox.com/scl/fi/r939hrme3k1bc8hs1pvg9/Lure_Social_2025_04_Apr22_EarthDay_Post_03_v01.jpg?rlkey=th1zqdw9eub77v3z81rbntpty&dl=0","https://www.dropbox.com/scl/fi/aa0ujh5towsj3725rdwpk/Lure_Social_2025_04_Apr22_EarthDay_Post_04_v01.jpg?rlkey=fj0ab26qaolknitt4mtvgtmfn&dl=0","https://www.dropbox.com/scl/fi/uibwmak3umqtwtlb5x6x8/Lure_Social_2025_04_Apr22_EarthDay_Post_05_v01.jpg?rlkey=knigleqkz3whjzoshss9o65wz&dl=0"]},"2":{"type":"carousel","urls":["https://www.dropbox.com/scl/fi/nvf10epp2sa2kb5h0qdo1/Lure_Social_2025_04_Apr30_HealthyEating_Post_01_v01.jpg?rlkey=9ysv5huhv7f0a474ungl5walq&dl=0","https://www.dropbox.com/scl/fi/qbqbzfqgc0z9d7tfmmb5f/Lure_Social_2025_04_Apr30_HealthyEating_Post_02_v01.jpg?rlkey=054cahe0qm7ohw2mxixe8nxw2&dl=0","https://www.dropbox.com/scl/fi/w8vqb6l7mhny7q2schd8i/Lure_Social_2025_04_Apr30_HealthyEating_Post_03_v01.jpg?rlkey=62weobypj12arsar8pqir1ey7&dl=0","https://www.dropbox.com/scl/fi/hr2c4v0hf0qrab3p4b3y3/Lure_Social_2025_04_Apr30_HealthyEating_Post_04_v01.jpg?rlkey=759bbxap4zgwovk8ch4ocsz2p&dl=0","https://www.dropbox.com/scl/fi/gm20hcbo63tq2g7416xd7/Lure_Social_2025_04_Apr30_HealthyEating_Post_05_v01.jpg?rlkey=15bo5cr6ua83u2w928f15pi7h&dl=0","https://www.dropbox.com/scl/fi/vnytlw9xhkpjmq37zpr6n/Lure_Social_2025_04_Apr30_HealthyEating_Post_06_v01.jpg?rlkey=os2ubr5cbv62hmqsq9cg2nc6z&dl=0"]},"8":{"type":"video","url":"https://www.dropbox.com/scl/fi/qmo258zemfhgyjowyrwti/Lure_Social_2025_04_Apr26_SoundsOfTheKitchen_Reel_v01.mp4?rlkey=rw1khkukl08rbclq03zlsntxl&dl=0","coverUrl":"https://www.dropbox.com/scl/fi/bikfqv8aqgzdpoaxyy1rz/Lure_Social_2025_04_Apr26_SoundsOfTheKitchen_Cover_v01.png?rlkey=93h4fuexkdxct4626pm4vsv4r&dl=0"}};
let carouselIndex = {"1":0,"2":0};
let currentView = 'grid';
let currentFilter = 'all';

// ─── DROPBOX URL HELPER ───────────────────────────────────────────────────────
function toDirectUrl(url) {
  if (!url) return url;
  // Convert Dropbox share links to direct/raw links
  return url
    .replace('www.dropbox.com', 'dl.dropboxusercontent.com')
    .replace('?dl=0', '')
    .replace('?dl=1', '')
    .replace('?raw=1', '');
}

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
function formatDateDisplay(iso) {
  if (!iso) return 'Set date';
  const [y,m,d] = iso.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
}
function sortPosts() {
  posts.sort((a,b) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return new Date(a.date) - new Date(b.date);
  });
}

// ─── RENDER HELPERS ──────────────────────────────────────────────────────────
function badgeClass(f){return{feed:'badge-feed',reel:'badge-reel',carousel:'badge-carousel',story:'badge-story'}[f]||'badge-feed';}
function fmtLabel(f){return{feed:'Feed',reel:'Reel',carousel:'Carousel',story:'Story'}[f]||f;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function shortUrl(url){try{return url.length>35?'…'+url.slice(-32):url;}catch(e){return url;}}

// ─── RENDER MEDIA ─────────────────────────────────────────────────────────────
function renderMedia(post) {
  const m = mediaStore[post.id];
  if (!m) {
    return `<div class="media-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      <span>Click "Edit media" to add</span>
    </div>`;
  }
  if (m.type === 'image') {
    return `<img src="${toDirectUrl(m.url)}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.display='none';this.nextSibling.style.display='flex'" />
    <div class="media-placeholder" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
      <span>Image not loading — check URL</span>
    </div>`;
  }
  if (m.type === 'carousel') {
    const idx = carouselIndex[post.id] || 0;
    const urls = m.urls || [];
    if (!urls.length) return `<div class="media-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg><span>No slides added yet</span></div>`;
    const dots = urls.map((_,i) => `<div class="carousel-dot${i===idx?' active':''}"></div>`).join('');
    return `<div class="carousel-viewer">
      <img src="${toDirectUrl(urls[idx])}" alt="Slide ${idx+1}" style="width:100%;height:100%;object-fit:cover;" />
      ${urls.length>1?`
      <div class="carousel-nav">
        <button class="carousel-btn" onclick="event.stopPropagation();carouselStep(${post.id},-1)">&#8249;</button>
        <button class="carousel-btn" onclick="event.stopPropagation();carouselStep(${post.id},1)">&#8250;</button>
      </div>
      <div class="carousel-dots">${dots}</div>`:''}
    </div>`;
  }
  if (m.type === 'video') {
    return `<div class="video-thumb" onclick="event.stopPropagation();openVideoPopup(${post.id})">
      ${m.coverUrl
        ? `<img src="${toDirectUrl(m.coverUrl)}" style="width:100%;height:100%;object-fit:cover;" />`
        : `<div class="no-cover"><svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg></div>`
      }
      <div class="play-btn"><svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg></div>
    </div>`;
  }
  return '';
}

// ─── RENDER MEDIA PANEL ───────────────────────────────────────────────────────
function renderMediaPanel(post) {
  const m = mediaStore[post.id];
  const activeTab = m ? m.type : 'image';
  const carouselUrls = (m && m.type === 'carousel' && m.urls) ? m.urls : [];
  const carouselItems = carouselUrls.map((u,i) =>
    `<div class="carousel-url-item">
      <span title="${esc(u)}">${shortUrl(u)}</span>
      <button class="carousel-url-remove" onclick="removeCarouselUrl(${post.id},${i})">&#x2715;</button>
    </div>`
  ).join('');

  return `<div class="media-panel" id="panel-${post.id}">
    <div class="media-panel-title">Add media via URL</div>
    <div class="panel-type-tabs">
      <button class="panel-tab${activeTab==='image'?' active':''}" onclick="switchPanelTab(${post.id},'image')">Image</button>
      <button class="panel-tab${activeTab==='carousel'?' active':''}" onclick="switchPanelTab(${post.id},'carousel')">Carousel</button>
      <button class="panel-tab${activeTab==='video'?' active':''}" onclick="switchPanelTab(${post.id},'video')">Video</button>
    </div>

    <div class="panel-section${activeTab==='image'?' active':''}" id="panel-image-${post.id}">
      <div class="url-input-row">
        <input class="url-input" id="img-url-${post.id}" placeholder="Paste Dropbox image URL…" value="${m&&m.type==='image'?esc(m.url):''}" />
        <button class="url-apply-btn" onclick="applyImageUrl(${post.id})">Apply</button>
      </div>
    </div>

    <div class="panel-section${activeTab==='carousel'?' active':''}" id="panel-carousel-${post.id}">
      <div class="carousel-url-list" id="carousel-list-${post.id}">${carouselItems}</div>
      <div class="carousel-add-row">
        <input class="url-input" id="car-url-${post.id}" placeholder="Paste Dropbox image URL…" />
        <button class="url-apply-btn" onclick="addCarouselUrl(${post.id})">Add</button>
      </div>
    </div>

    <div class="panel-section${activeTab==='video'?' active':''}" id="panel-video-${post.id}">
      <div class="url-input-row">
        <input class="url-input" id="vid-url-${post.id}" placeholder="Paste Dropbox video URL…" value="${m&&m.type==='video'?esc(m.url):''}" />
        <button class="url-apply-btn" onclick="applyVideoUrl(${post.id})">Apply</button>
      </div>
      <div style="width:100%;margin-top:2px;">
        <div class="media-panel-title" style="margin-bottom:4px;">Cover image (optional)</div>
        <div class="url-input-row">
          <input class="url-input" id="cov-url-${post.id}" placeholder="Paste cover image URL…" value="${m&&m.type==='video'&&m.coverUrl?esc(m.coverUrl):''}" />
          <button class="url-apply-btn" onclick="applyCoverUrl(${post.id})">Apply</button>
        </div>
      </div>
    </div>

    <button class="panel-cancel-btn" onclick="closePanel(${post.id})">Done</button>
  </div>`;
}

// ─── RENDER CARD ──────────────────────────────────────────────────────────────
function renderCard(post) {
  const isLong = (post.caption||'').length > 200;
  return `<div class="post-card" id="card-${post.id}" data-id="${post.id}" data-format="${post.format}">
    <div class="post-media" id="media-${post.id}">
      ${renderMedia(post)}
      ${renderMediaPanel(post)}
      <button class="format-badge ${badgeClass(post.format)}" onclick="event.stopPropagation();toggleFmtDrop(${post.id})">${fmtLabel(post.format)}</button>
      <div class="format-dropdown" id="fmtdrop-${post.id}">
        <div class="format-option" onclick="setFormat(${post.id},'feed')">Feed</div>
        <div class="format-option" onclick="setFormat(${post.id},'reel')">Reel</div>
        <div class="format-option" onclick="setFormat(${post.id},'carousel')">Carousel</div>
        <div class="format-option" onclick="setFormat(${post.id},'story')">Story</div>
      </div>
      <button class="edit-media-btn" onclick="event.stopPropagation();openPanel(${post.id})">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 2l3 3-8 8H3v-3L11 2z"/></svg>
        Edit media
      </button>
    </div>
    <div class="post-body">
      <div class="post-date-wrap">
        <span class="post-date" onclick="toggleDatePicker(${post.id})">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="10" height="9" rx="1"/><path d="M1 5h10M4 1v2M8 1v2"/></svg>
          ${formatDateDisplay(post.date)}
        </span>
        <div class="date-picker-wrap" id="datepicker-${post.id}">
          <input type="date" value="${post.date||''}" onchange="saveDate(${post.id},this.value)" />
        </div>
      </div>
      <div class="post-title" id="ttl-${post.id}" onclick="editTitle(${post.id})">${esc(post.title||'')}</div>
      <input class="post-title-input" id="ttlinp-${post.id}" value="${esc(post.title||'')}" onblur="saveTitle(${post.id})" onkeydown="if(event.key==='Enter')saveTitle(${post.id})" />
      <div class="caption-label">Caption</div>
      <div class="caption-text${isLong?'':' expanded'}" id="cap-${post.id}">${esc(post.caption||'')}${isLong?'<div class="caption-fade"></div>':''}</div>
      <textarea class="caption-textarea" id="capta-${post.id}" onblur="saveCaption(${post.id})">${esc(post.caption||'')}</textarea>
      ${isLong?`<button class="read-more" onclick="toggleCaption(${post.id})">Read more</button>`:''}
      <button class="edit-caption-btn" id="editcapbtn-${post.id}" onclick="toggleEditCaption(${post.id})">✎ Edit caption</button>
    </div>
  </div>`;
}

function renderGrid() {
  sortPosts();
  const grid = document.getElementById('postsGrid');
  const filtered = posts.filter(p => currentFilter==='all' || p.format===currentFilter);
  grid.className = 'grid'+(currentView==='list'?' list-view':'');
  grid.innerHTML = filtered.map(p => renderCard(p)).join('') + renderAddPostCard();
  updateStats();
}

function updateStats() {
  const now = new Date();
  document.getElementById('headerDate').textContent = `Prepared ${now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><span class="stat-label">Total:</span><span class="stat-count">${posts.length}</span></div>
    <div class="stat"><span class="stat-label">Feed:</span><span class="stat-count">${posts.filter(p=>p.format==='feed').length}</span></div>
    <div class="stat"><span class="stat-label">Reels:</span><span class="stat-count">${posts.filter(p=>p.format==='reel').length}</span></div>
    <div class="stat"><span class="stat-label">Carousels:</span><span class="stat-count">${posts.filter(p=>p.format==='carousel').length}</span></div>
    <div class="stat"><span class="stat-label">Stories:</span><span class="stat-count">${posts.filter(p=>p.format==='story').length}</span></div>`;
}

// ─── MEDIA PANEL CONTROLS ─────────────────────────────────────────────────────
function openPanel(id) {
  const panel = document.getElementById(`panel-${id}`);
  if (panel) panel.classList.add('active');
}
function closePanel(id) {
  const panel = document.getElementById(`panel-${id}`);
  if (panel) panel.classList.remove('active');
}
function switchPanelTab(id, type) {
  ['image','carousel','video'].forEach(t => {
    const tab = document.querySelector(`#panel-${id} .panel-tab:nth-child(${['image','carousel','video'].indexOf(t)+1})`);
    const sec = document.getElementById(`panel-${t}-${id}`);
    if (tab) tab.classList.toggle('active', t===type);
    if (sec) sec.classList.toggle('active', t===type);
  });
}

function applyImageUrl(id) {
  const val = document.getElementById(`img-url-${id}`)?.value.trim();
  if (!val) return;
  mediaStore[id] = { type:'image', url:val };
  closePanel(id);
  renderGrid();
}

function addCarouselUrl(id) {
  const inp = document.getElementById(`car-url-${id}`);
  const val = inp?.value.trim();
  if (!val) return;
  if (!mediaStore[id] || mediaStore[id].type !== 'carousel') mediaStore[id] = { type:'carousel', urls:[] };
  mediaStore[id].urls.push(val);
  if (!carouselIndex[id]) carouselIndex[id] = 0;
  inp.value = '';
  renderGrid();
  // Re-open panel on the carousel tab after re-render
  setTimeout(() => { openPanel(id); switchPanelTab(id,'carousel'); }, 10);
}

function removeCarouselUrl(id, idx) {
  if (mediaStore[id] && mediaStore[id].urls) {
    mediaStore[id].urls.splice(idx, 1);
    if (carouselIndex[id] >= mediaStore[id].urls.length) carouselIndex[id] = Math.max(0, mediaStore[id].urls.length-1);
  }
  renderGrid();
  setTimeout(() => { openPanel(id); switchPanelTab(id,'carousel'); }, 10);
}

function applyVideoUrl(id) {
  const val = document.getElementById(`vid-url-${id}`)?.value.trim();
  if (!val) return;
  const existing = mediaStore[id];
  mediaStore[id] = { type:'video', url:val, coverUrl: existing?.coverUrl || null };
  renderGrid();
  setTimeout(() => { openPanel(id); switchPanelTab(id,'video'); }, 10);
}

function applyCoverUrl(id) {
  const val = document.getElementById(`cov-url-${id}`)?.value.trim();
  if (!mediaStore[id] || mediaStore[id].type !== 'video') {
    alert('Please apply a video URL first.');
    return;
  }
  mediaStore[id].coverUrl = val || null;
  renderGrid();
  setTimeout(() => { openPanel(id); switchPanelTab(id,'video'); }, 10);
}

// ─── VIDEO POPUP ──────────────────────────────────────────────────────────────
function openVideoPopup(id) {
  const m = mediaStore[id];
  if (!m || m.type !== 'video' || !m.url) return;
  const post = posts.find(p => p.id === id);
  const vid = document.getElementById('popupVideo');
  vid.src = toDirectUrl(m.url);
  vid.play();
  document.getElementById('popupTitle').textContent = post ? post.title : '';
  document.getElementById('videoPopup').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeVideoPopup(e) {
  if (e.target === document.getElementById('videoPopup')) closeVideoPopupBtn();
}
function closeVideoPopupBtn() {
  const vid = document.getElementById('popupVideo');
  vid.pause();
  vid.src = '';
  document.getElementById('videoPopup').classList.remove('active');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVideoPopupBtn(); });

// ─── CAROUSEL NAV ─────────────────────────────────────────────────────────────
function carouselStep(id, dir) {
  const m = mediaStore[id];
  if (!m || !m.urls || !m.urls.length) return;
  carouselIndex[id] = ((carouselIndex[id]||0) + dir + m.urls.length) % m.urls.length;
  renderGrid();
}

// ─── EDITING ─────────────────────────────────────────────────────────────────
function toggleDatePicker(id) {
  const wrap = document.getElementById(`datepicker-${id}`);
  const open = wrap.style.display === 'block';
  wrap.style.display = open ? 'none' : 'block';
  if (!open) { const inp = wrap.querySelector('input'); inp.focus(); try{inp.showPicker();}catch(e){} }
}
function saveDate(id, val) {
  const post = posts.find(p=>p.id===id);
  if (post) post.date = val||'';
  document.getElementById(`datepicker-${id}`).style.display = 'none';
  renderGrid();
}
function editTitle(id) {
  document.getElementById(`ttl-${id}`).style.display='none';
  const inp=document.getElementById(`ttlinp-${id}`);
  inp.style.display='block';inp.focus();inp.select();
}
function saveTitle(id) {
  const val=document.getElementById(`ttlinp-${id}`)?.value.trim();
  if(val) posts.find(p=>p.id===id).title=val;
  renderGrid();
}
function toggleEditCaption(id) {
  const lbl=document.getElementById(`cap-${id}`);
  const ta=document.getElementById(`capta-${id}`);
  const btn=document.getElementById(`editcapbtn-${id}`);
  if(ta.style.display==='block'){
    posts.find(p=>p.id===id).caption=ta.value;
    renderGrid();
  } else {
    lbl.style.display='none';
    ta.style.display='block';ta.focus();
    btn.textContent='✓ Done editing';
  }
}
function saveCaption(id){const ta=document.getElementById(`capta-${id}`);if(ta)posts.find(p=>p.id===id).caption=ta.value;}
function toggleCaption(id){
  const el=document.getElementById(`cap-${id}`);if(!el)return;
  el.classList.toggle('expanded');
  const btn=el.nextElementSibling;
  if(btn&&btn.classList.contains('read-more'))btn.textContent=el.classList.contains('expanded')?'Read less':'Read more';
}
function toggleFmtDrop(id){
  document.querySelectorAll('.format-dropdown').forEach(d=>{if(d.id!==`fmtdrop-${id}`)d.style.display='none';});
  const dd=document.getElementById(`fmtdrop-${id}`);
  dd.style.display=dd.style.display==='block'?'none':'block';
}
function setFormat(id,fmt){posts.find(p=>p.id===id).format=fmt;document.getElementById(`fmtdrop-${id}`).style.display='none';renderGrid();}
document.addEventListener('click',e=>{
  if(!e.target.closest('.format-badge')&&!e.target.closest('.format-dropdown'))
    document.querySelectorAll('.format-dropdown').forEach(d=>d.style.display='none');
});

// ─── FILTER / VIEW ────────────────────────────────────────────────────────────
function filterPosts(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderGrid();}
function setView(v){currentView=v;document.getElementById('gridBtn').classList.toggle('active',v==='grid');document.getElementById('listBtn').classList.toggle('active',v==='list');renderGrid();}

// ─── ADD POST ─────────────────────────────────────────────────────────────────
let showingAddForm = false;

function renderAddPostCard() {
  if (!showingAddForm) {
    return `<div class="add-post-card" onclick="showAddForm()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
      Add post
    </div>`;
  }
  return `<div class="new-post-form-card">
    <h3>New post</h3>
    <div class="new-post-field">
      <label>Title</label>
      <input type="text" id="new-title" placeholder="e.g. Charbroiled Oysters — Feed" autofocus />
    </div>
    <div class="new-post-field">
      <label>Scheduled date</label>
      <input type="date" id="new-date" />
    </div>
    <div class="new-post-field">
      <label>Format</label>
      <div class="format-radio-group">
        <input type="radio" class="format-radio" name="new-format" id="fmt-feed" value="feed" checked>
        <label class="format-radio-label" for="fmt-feed">Feed</label>
        <input type="radio" class="format-radio" name="new-format" id="fmt-reel" value="reel">
        <label class="format-radio-label" for="fmt-reel">Reel</label>
        <input type="radio" class="format-radio" name="new-format" id="fmt-carousel" value="carousel">
        <label class="format-radio-label" for="fmt-carousel">Carousel</label>
        <input type="radio" class="format-radio" name="new-format" id="fmt-story" value="story">
        <label class="format-radio-label" for="fmt-story">Story</label>
      </div>
    </div>
    <div class="new-post-actions">
      <button class="new-post-cancel" onclick="cancelAddPost()">Cancel</button>
      <button class="new-post-submit" onclick="submitAddPost()">Add post</button>
    </div>
  </div>`;
}

function showAddForm() {
  showingAddForm = true;
  renderGrid();
  setTimeout(() => document.getElementById('new-title')?.focus(), 50);
}

function cancelAddPost() {
  showingAddForm = false;
  renderGrid();
}

function submitAddPost() {
  const title = document.getElementById('new-title')?.value.trim();
  if (!title) { document.getElementById('new-title')?.focus(); return; }
  const date = document.getElementById('new-date')?.value || '';
  const format = document.querySelector('input[name="new-format"]:checked')?.value || 'feed';
  const newId = posts.length ? Math.max(...posts.map(p => p.id)) + 1 : 1;
  posts.push({ id:newId, title, date, format, caption:'' });
  showingAddForm = false;
  renderGrid();
}

// ─── SAVE & EXPORT ────────────────────────────────────────────────────────────
window.__pageTemplate = document.documentElement.outerHTML;

function saveFile(){
  const btn=document.querySelector('.save-btn');
  const original=btn.innerHTML;
  btn.textContent='Saving…';

  const postsJSON=JSON.stringify(posts);
  const mediaJSON=JSON.stringify(mediaStore);
  const carouselJSON=JSON.stringify(carouselIndex);

  let out=window.__pageTemplate||'';
  if(!out){alert('Template unavailable. Reload and try again.');btn.innerHTML=original;return;}

  out=out.replace(/let posts = \[[\s\S]*?\];/,`let posts = ${postsJSON};`);
  out=out.replace(/let mediaStore = \{\};/,`let mediaStore = ${mediaJSON};`);
  out=out.replace(/let carouselIndex = \{\};/,`let carouselIndex = ${carouselJSON};`);
  out=out.replace(/let showingAddForm = false;/,'let showingAddForm = false;');
  out=out.replace(/window\.__pageTemplate = document\.documentElement\.outerHTML;/,'window.__pageTemplate = document.documentElement.outerHTML;');

  const blob=new Blob([out],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='Lure_Social_Post_Review.html';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  setTimeout(()=>{btn.innerHTML=original;},1500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderGrid();
</script></body></html>
